defaults:
  - default_dataset.yaml

exp_name: prosthesis_finetune_random_80_20
img_size: 518
num_workers: 4
seed_value: 2024
accum_steps: 1
patch_size: 14
val_epoch_freq: 5
max_img_per_gpu: 1

limit_train_batches: 1000
limit_val_batches: 100


data:
  train:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      debug: False
      repeat_batch: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.prosthesis.ProsthesisDataset
          split: train
          PROSTHESIS_DIR: /home/woody/iwnt/iwnt164h/mlp_dataset/prospthesisproject-Data/Code/Data
          split_file: /home/woody/iwnt/iwnt164h/mlp_dataset/prospthesisproject-Data/Code/data_split/random_80_20/train_list.txt
          min_num_images: 1
          len_train: 10000
          focal_length: 1.0
  val:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      debug: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.prosthesis.ProsthesisDataset
          split: test
          PROSTHESIS_DIR: /home/woody/iwnt/iwnt164h/mlp_dataset/prospthesisproject-Data/Code/Data
          split_file: /home/woody/iwnt/iwnt164h/mlp_dataset/prospthesisproject-Data/Code/data_split/random_80_20/val_list.txt
          min_num_images: 1
          len_test: 1000
          focal_length: 1.0


logging:
  log_dir: /home/woody/iwnt/iwnt164h/mlp_dataset/prospthesisproject-Data/Code/Data/output/vggt/training/prosthesis_finetune_random_80_20
  log_visuals: False
  log_freq: 1
  log_level_primary: DEBUG
  log_level_secondary: WARNING
  all_ranks: False
  tensorboard_writer:
    _target_: train_utils.tb_writer.TensorBoardLogger
    path: ${logging.log_dir}/tensorboard
  scalar_keys_to_log:
    train:
      keys_to_log:
        - loss_objective
        - loss_conf_depth
        - loss_reg_depth
        - loss_grad_depth
    val:
      keys_to_log:
        - loss_objective
        - loss_conf_depth
        - loss_reg_depth
        - loss_grad_depth



checkpoint:
  save_dir: /home/woody/iwnt/iwnt164h/mlp_dataset/prospthesisproject-Data/Code/Data/output/vggt/training/prosthesis_finetune_random_80_20/ckpts
  save_freq: 100
  resume_checkpoint_path: /home/woody/iwnt/iwnt164h/checkpoint/vggt_1b.pt
  strict: False


loss:
  _target_: loss.MultitaskLoss
  camera: null
  depth:
    weight: 1.0
    gradient_loss_fn: "grad"
    valid_range: 0.98
  point: null
  track: null



optim:
  param_group_modifiers: False

  optimizer:
    _target_: torch.optim.AdamW
    lr: 1e-4
    weight_decay: 0.05

  frozen_module_names:
      - "*aggregator*"

  amp:
    enabled: True
    amp_dtype: bfloat16
  gradient_clip:
    _target_: train_utils.gradient_clip.GradientClipper
    configs:
      - module_name: ["depth"]
        max_norm: 1.0
        norm_type: 2
  options:
    lr:
      - scheduler:
          _target_: fvcore.common.param_scheduler.CompositeParamScheduler
          schedulers:
            - _target_: fvcore.common.param_scheduler.LinearParamScheduler
              start_value: 1e-6
              end_value: 1e-4
            - _target_: fvcore.common.param_scheduler.CosineParamScheduler
              start_value: 1e-4
              end_value: 1e-6
          lengths: [0.05, 0.95]
          interval_scaling: ['rescaled', 'rescaled']
    weight_decay:
      - scheduler:
          _target_: fvcore.common.param_scheduler.ConstantParamScheduler
          value: 0.05




max_epochs: 20

model:
  _target_: vggt.models.vggt.VGGT
  enable_camera: False
  enable_depth: True
  enable_point: False
  enable_track: False



distributed:
  backend: nccl
  comms_dtype: None
  find_unused_parameters: False
  timeout_mins: 30
  gradient_as_bucket_view: True
  bucket_cap_mb: 25
  broadcast_buffers: True

cuda:
  cudnn_deterministic: False
  cudnn_benchmark: False
  allow_tf32: True
